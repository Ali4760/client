<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
<div class="app-container" style="background:var(--bg-secondary);padding-bottom:0;min-height:100vh;">

  <!-- Premium Animated SVG Floating Gradient Background Backdrop -->
  <div class="gradient-bg-wrapper">
    <svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="rev_grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color: var(--color-primary); stop-opacity: 0.8;" /><stop offset="100%" style="stop-color: var(--color-chart-3); stop-opacity: 0.6;" /></linearGradient>
        <linearGradient id="rev_grad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color: var(--color-chart-4); stop-opacity: 0.9;" /><stop offset="50%" style="stop-color: var(--color-secondary); stop-opacity: 0.7;" /><stop offset="100%" style="stop-color: var(--color-chart-1); stop-opacity: 0.6;" /></linearGradient>
        <radialGradient id="rev_grad3" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color: var(--color-destructive); stop-opacity: 0.8;" /><stop offset="100%" style="stop-color: var(--color-chart-5); stop-opacity: 0.4;" /></radialGradient>
        <filter id="rev_blur1" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="35"/></filter>
        <filter id="rev_blur2" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="25"/></filter>
        <filter id="rev_blur3" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="45"/></filter>
      </defs>
      <g class="float-g1">
        <ellipse cx="200" cy="500" rx="250" ry="180" fill="url(#rev_grad1)" filter="url(#rev_blur1)" transform="rotate(-30 200 500)"/>
        <rect x="500" y="100" width="300" height="250" rx="80" fill="url(#rev_grad2)" filter="url(#rev_blur2)" transform="rotate(15 650 225)"/>
      </g>
      <g class="float-g2">
        <circle cx="650" cy="450" r="150" fill="url(#rev_grad3)" filter="url(#rev_blur3)" opacity="0.7"/>
        <ellipse cx="50" cy="150" rx="180" ry="120" fill="var(--color-accent)" filter="url(#rev_blur2)" opacity="0.8"/>
      </g>
    </svg>
  </div>

  <div class="page-header" style="background:transparent;border:none;">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
  </div>

  <div class="auth-container" style="padding-top:10px;">
    <h1 class="auth-title">Create Account</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-top:-24px;margin-bottom:28px;">Join our platform and start earning</p>
    
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">Nick name</label>
        <div style="position:relative;">
          <input type="text" id="registerNickname" class="form-input" placeholder="Please enter a nickname" style="padding-left:44px;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative;">
          <input type="email" id="registerEmail" class="form-input" placeholder="Please enter your email address" style="padding-left:44px; height: 50px;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Phone number</label>
        <div style="display:flex; gap: 8px;">
          <div style="position:relative; width: 110px; flex-shrink: 0;" id="customCountryDropdownContainer">
            <!-- Hidden input maintaining complete compatibility with existing JS registration hooks -->
            <input type="hidden" id="registerCountryCode" value="+20">
            <div id="countryDropdownTrigger" style="display:flex; align-items:center; justify-content:space-between; width:100%; height:50px; padding:0 12px; cursor:pointer; font-size:14px; font-weight:600; user-select:none; transition:all 0.3s ease; border-radius:14px; border:none; background:transparent;">
              <span id="selectedCountryDisplay">🇪🇬 +20</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6;"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            
            <div id="countryDropdownMenu" style="display:none; position:absolute; top:56px; left:0; width:290px; max-height:280px; z-index:2000; overflow:hidden; flex-direction:column;">
              <div style="padding:10px; border-bottom:1px solid var(--border-glass); background:rgba(0,0,0,0.06); display:flex; align-items:center;">
                <input type="text" id="countrySearchInput" placeholder="Search country..." style="width:100%; height:36px; padding:0 10px; border:1px solid var(--border-glass); border-radius:8px; background:var(--bg-input); color:var(--text-primary); font-size:13px; font-weight:500; outline:none;">
              </div>
              <div id="countryListArea" style="flex:1; overflow-y:auto; max-height:220px; padding:6px 0;">
                <!-- Populate dynamically via dynamic JS country list -->
              </div>
            </div>
          </div>
          <div style="position:relative; flex:1;">
            <input type="tel" id="registerPhone" class="form-input" placeholder="Please enter phone number" style="padding-left:44px; height: 50px;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            </span>
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" id="registerPassword" class="form-input" placeholder="Please enter the password" style="padding-left:44px; height: 50px;" oninput="checkPasswordStrength(this)">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
        </div>
        <div class="password-strength">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
        <div class="strength-text"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Captcha Verification</label>
        <div style="display:flex; gap: 8px;">
          <div style="position:relative; flex:1;">
            <input type="text" id="registerCaptchaAnswer" class="form-input" placeholder="Enter captcha answer" style="padding-left:44px; height: 50px;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
            </span>
          </div>
          <div id="captchaBox" style="width: 105px; height: 50px; background: var(--bg-input); border-radius: 14px; border: 1px solid var(--border-glass); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--accent); user-select: none; letter-spacing: 0.05em; cursor: pointer; flex-shrink: 0;" title="Click to refresh captcha" onclick="generateNewCaptcha()">
            5 + 7
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Invitation code</label>
        <div style="position:relative;">
          <input type="text" id="registerInviteCode" class="form-input" placeholder="Please enter the invitation code" style="padding-left:44px; height: 50px;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--text-muted);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
          </span>
        </div>
      </div>

      <button class="auth-btn" onclick="handleRegistration()">Register</button>
    </div>

    <div class="auth-footer">
      Existing users? <a href="login.html">Log in</a>
    </div>
  </div>

</div>

  document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.getElementById('countryDropdownTrigger');
    const menu = document.getElementById('countryDropdownMenu');
    const searchInput = document.getElementById('countrySearchInput');
    const listArea = document.getElementById('countryListArea');
    const hiddenInput = document.getElementById('registerCountryCode');
    const selectedDisplay = document.getElementById('selectedCountryDisplay');
    const container = document.getElementById('customCountryDropdownContainer');

    let currentSelectedCode = "+20";

    function populateDropdown(filterText = "") {
      listArea.innerHTML = "";
      const query = filterText.toLowerCase().trim();

      allCountries.forEach(country => {
        const matchesName = country.name.toLowerCase().includes(query);
        const matchesCode = country.code.includes(query);

        if (matchesName || matchesCode) {
          const item = document.createElement('div');
          item.className = 'country-item';
          if (country.code === currentSelectedCode && (country.name === 'Egypt' || currentSelectedCode !== '+20')) {
            item.classList.add('selected');
          }

          item.innerHTML = `
            <span class="flag-code">
              <span style="font-size:16px; margin-right:4px;">${country.emoji}</span>
              <span>${country.code}</span>
            </span>
            <span class="country-name" title="${country.name}">${country.name}</span>
          `;

          item.addEventListener('click', () => {
            currentSelectedCode = country.code;
            hiddenInput.value = country.code;
            selectedDisplay.innerHTML = `${country.emoji} ${country.code}`;
            closeDropdown();

            // Trigger standard form updates if needed
            const event = new Event('change', { bubbles: true });
            hiddenInput.dispatchEvent(event);
          });

          listArea.appendChild(item);
        }
      });

      if (listArea.children.length === 0) {
        const noResults = document.createElement('div');
        noResults.style.cssText = "padding:12px; font-size:12px; color:var(--text-muted); text-align:center;";
        noResults.textContent = "No results found";
        listArea.appendChild(noResults);
      }
    }

    function toggleDropdown() {
      const isVisible = menu.style.display === 'flex';
      if (isVisible) {
        closeDropdown();
      } else {
        openDropdown();
      }
    }

    function openDropdown() {
      menu.style.display = 'flex';
      container.classList.add('active');
      searchInput.value = "";
      populateDropdown();
      setTimeout(() => searchInput.focus(), 50);
    }

    function closeDropdown() {
      menu.style.display = 'none';
      container.classList.remove('active');
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDropdown();
    });

    searchInput.addEventListener('input', (e) => {
      populateDropdown(e.target.value);
    });

    searchInput.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    document.addEventListener('click', (e) => {
      if (!container.contains(e.target)) {
        closeDropdown();
      }
    });

    // Default select Egypt
    hiddenInput.value = "+20";
    populateDropdown();
  });
</script>
