<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Invite friends</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="invite">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">Invite friends</span>
  </div>

  <div class="invite-content">
    <div class="invite-card">
      <div class="invite-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      </div>
      <h2 class="invite-title">Invite friends to enjoy a large income</h2>
      <p class="invite-desc">For every profit earned by friends, you will get the corresponding proportion commission. Come on!</p>
      
      <div style="margin: 24px 0 8px; text-align: left; font-size: 13px; color: var(--text-secondary);">Invitation code</div>
      <div class="invite-code-box">
        <span class="invite-code-text">ABCDEF</span>
        <button class="copy-btn" onclick="alert('Replication')">Click to copy</button>
      </div>

      <div style="margin: 16px 0 8px; text-align: left; font-size: 13px; color: var(--text-secondary);">Invitation link</div>
      <div class="invite-code-box" style="margin-bottom: 24px;">
        <span class="invite-code-text" style="font-size: 13px; letter-spacing: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">https://qivonxa.shop/#/register?code=ABCDEF</span>
        <button class="copy-btn" onclick="alert('Replication')">Click to copy</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
