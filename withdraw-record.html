<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Withdrawals record</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="withdraw-record">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">❮</button>
    <span class="title">Withdrawals record</span>
  </div>

  <div class="record-list" style="margin-top: 16px;">
    <div class="record-card">
      <div class="record-row">
        <span class="label">Amount</span>
        <span class="value">500.00</span>
      </div>
      <div class="record-row">
        <span class="label">State</span>
        <span class="value pending">To be reviewed</span>
      </div>
      <div class="record-row">
        <span class="label">Time</span>
        <span class="value">2025-11-08 14:45:10</span>
      </div>
    </div>

    <div class="record-card">
      <div class="record-row">
        <span class="label">Amount</span>
        <span class="value">200.00</span>
      </div>
      <div class="record-row">
        <span class="label">State</span>
        <span class="value success">Examination passed</span>
      </div>
      <div class="record-row">
        <span class="label">Time</span>
        <span class="value">2025-11-06 11:20:05</span>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
