<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Recharge record</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="recharge-record">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">Recharge record</span>
  </div>

  <div class="record-list" style="margin-top: 16px;">
    <div class="record-card">
      <div class="record-row">
        <span class="label">Amount</span>
        <span class="value success">150.00</span>
      </div>
      <div class="record-row">
        <span class="label">Income</span>
        <span class="value">0.00</span>
      </div>
      <div class="record-row">
        <span class="label">Time</span>
        <span class="value">2025-11-08 14:30:22</span>
      </div>
    </div>

    <div class="record-card">
      <div class="record-row">
        <span class="label">Amount</span>
        <span class="value success">500.00</span>
      </div>
      <div class="record-row">
        <span class="label">Income</span>
        <span class="value">0.00</span>
      </div>
      <div class="record-row">
        <span class="label">Time</span>
        <span class="value">2025-11-05 10:20:15</span>
      </div>
    </div>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
