<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Withdraw</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="withdraw">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">Withdraw</span>
  </div>

  <div class="withdrawal-info">
    <div class="info-row">
      <span class="label">Available Balance</span>
      <span class="value" id="availableBalance">4,250.00 USDT</span>
    </div>
    <div class="info-row">
      <span class="label">At least withdrawal amount</span>
      <span class="value">10.00 USDT</span>
    </div>
  </div>

  <div class="recharge-form" style="padding-top: 0;">
    <div class="form-group">
      <label class="form-label">Network</label>
      <div style="position:relative; display:flex; align-items:center;">
        <input type="text" class="form-input" value="TRC20" readonly style="background: var(--bg-input); color: var(--text-primary); font-weight:600; padding-right:48px; cursor:default;">
        <span style="position:absolute; right:14px; cursor:pointer; color:var(--accent); display:flex; align-items:center;" onclick="alert('Only TRC20 address is supported')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Withdrawal address</label>
      <input type="text" class="form-input" id="withdrawAddressInput" placeholder="Please enter your TRC-20 address">
    </div>

    <div class="form-group">
      <label class="form-label">Amount</label>
      <input type="number" class="form-input" id="withdrawAmount" placeholder="Please enter the withdrawal amount" oninput="updateWithdrawDetails()">
      <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;" id="withdrawFeeText">Fee: 0% | Actually: 0.00 USDT</div>
    </div>

    <button class="btn-primary" onclick="submitWithdrawRequest()">Withdraw</button>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
