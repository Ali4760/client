<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Personal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">
<div class="app-container">
  
  <div class="profile-header">
    <div class="avatar-section">
      <div class="avatar">U</div>
    </div>
    <div class="user-name">--</div>
    <div class="user-id">ID: -- | Invitation code: --</div>
  </div>

  <div class="balance-card">
    <div class="balance-label">Balance</div>
    <div class="balance-value">--<span class="balance-unit">USDT</span></div>
    
    <div style="display:flex;gap:12px;margin-top:16px;">
      <a href="recharge.html" class="btn-primary" style="flex:1;text-decoration:none;display:inline-block;">Recharge</a>
      <a href="withdraw.html" class="btn-primary" style="flex:1;text-decoration:none;display:inline-block;background:var(--bg-input);">Withdraw</a>
    </div>
  </div>

  <div class="credit-section">
    <div class="credit-bar">
      <span class="credit-label">Credit Reputation</span>
      <div class="credit-progress">
        <div class="credit-fill" style="width:100%;"></div>
      </div>
      <span class="credit-value">100%</span>
    </div>
  </div>

  <div class="menu-list">
    <div class="menu-group">
      <a href="userinfo.html" class="menu-item">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <span class="menu-text">Personal information</span>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>
      <a href="financial.html" class="menu-item">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></span>
          <span class="menu-text">Capital details</span>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>
    </div>

    <div class="menu-group">
      <a href="recharge-record.html" class="menu-item">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
          <span class="menu-text">Recharge record</span>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>
      <a href="withdraw-record.html" class="menu-item">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
          <span class="menu-text">Withdrawals record</span>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>
    </div>

    <div class="menu-group">
      <a href="invite.html" class="menu-item">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></span>
          <span class="menu-text">Invite friends</span>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>
    </div>

    <div class="menu-group">
      <div class="menu-item theme-toggle-item" id="themeToggleBtn">
        <div class="menu-left">
          <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"/><line x1="18.36" y1="5.64" x2="19.78" y2="7.06"/></svg></span>
          <span class="menu-text">Dark Mode</span>
        </div>
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="themeSwitchCheckbox">
            <input type="checkbox" id="themeSwitchCheckbox" />
            <div class="slider round"></div>
          </label>
        </div>
      </div>
    </div>
  </div>

  <button class="signout-btn" onclick="openDialog('signOutDialog')">Sign out</button>

</div>

<!-- Sign Out Dialog -->
<div class="dialog-overlay" id="signOutDialog">
  <div class="dialog-box">
    <div class="dialog-title">System Notice</div>
    <div class="dialog-body">Are you sure you want to exit?</div>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeDialog('signOutDialog')">Cancel</button>
      <button class="btn btn-confirm" onclick="handleSignOut()">Confirm</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item" data-page="home"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Index</span></a>
  <a href="orders.html" class="nav-item" data-page="orders"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>Order</span></a>
  <a href="trade.html" class="nav-item" data-page="trade"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span><span>Trade</span></a>
  <a href="team.html" class="nav-item" data-page="team"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span>Team</span></a>
  <a href="profile.html" class="nav-item" data-page="profile"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Personal</span></a>
</nav>
<script type="module" src="js/app.js"></script>
</body>
</html>
