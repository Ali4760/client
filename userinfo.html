<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Personal information</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="userinfo">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">Personal information</span>
  </div>

  <div class="userinfo-list" style="margin-top: 16px;">
    <div class="userinfo-item" onclick="openDialog('nicknameDialog')">
      <span class="item-label">Nick name</span>
      <div class="item-value">
        <span id="userInfoNickname">User123</span>
        <span class="item-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
    </div>
    <div class="userinfo-item">
      <span class="item-label">Telephone</span>
      <div class="item-value">
        <span id="userInfoPhone">123****4567</span>
      </div>
    </div>
    <div class="userinfo-item" onclick="openDialog('passwordDialog')">
      <span class="item-label">Password</span>
      <div class="item-value">
        <span>Revise</span>
        <span class="item-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
    </div>
    <div class="userinfo-item" onclick="openDialog('addressDialog')">
      <span class="item-label">TRC-20 withdrawal address</span>
      <div class="item-value">
        <span id="userInfoAddress">TRx7...QrE8L</span>
        <span class="item-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
    </div>
  </div>
</div>

<!-- Nickname Dialog -->
<div class="dialog-overlay" id="nicknameDialog">
  <div class="dialog-box">
    <div class="dialog-title">Nick name</div>
    <div class="dialog-body" style="text-align: left;">
      <input type="text" class="form-input" id="inputNewNickname" placeholder="Please enter the nickname to be replaced">
    </div>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeDialog('nicknameDialog')">Cancel</button>
      <button class="btn btn-confirm" onclick="updateNickname()">Set up</button>
    </div>
  </div>
</div>

<!-- Password Dialog -->
<div class="dialog-overlay" id="passwordDialog">
  <div class="dialog-box">
    <div class="dialog-title">Password</div>
    <div class="dialog-body" style="text-align: left;">
      <input type="password" class="form-input mb-8" id="inputOldPassword" placeholder="Old Password">
      <input type="password" class="form-input mb-8" id="inputNewPassword" placeholder="New Password">
      <input type="password" class="form-input" id="inputConfirmPassword" placeholder="Confirm Password">
    </div>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeDialog('passwordDialog')">Cancel</button>
      <button class="btn btn-confirm" onclick="updatePassword()">Set up</button>
    </div>
  </div>
</div>


<!-- Address Dialog -->
<div class="dialog-overlay" id="addressDialog">
  <div class="dialog-box">
    <div class="dialog-title">TRC-20 withdrawal address</div>
    <div class="dialog-body" style="text-align: left;">
      <input type="text" class="form-input" id="inputNewAddress" placeholder="Please enter your address">
    </div>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeDialog('addressDialog')">Cancel</button>
      <button class="btn btn-confirm" onclick="updateWithdrawAddress()">Set up</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
