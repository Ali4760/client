<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Recharge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="recharge">
<div class="app-container">
  <div class="page-header"><span class="title">Recharge</span></div>

  <div class="recharge-form">
    <div class="form-group">
      <label class="form-label">Currency selection</label>
      <select class="form-select" id="rechargeCurrency">
        <option>USDT</option>
      </select>
    </div>
 
    <div class="form-group">
      <label class="form-label">Select the protocol to use</label>
      <select class="form-select" id="rechargeProtocol">
        <option>TRC-20</option>
        <option>ERC-20</option>
        <option>BRC-20</option>
      </select>
    </div>
 
    <div class="form-group">
      <label class="form-label">Deposit amount</label>
      <input type="number" class="form-input" id="rechargeAmount" placeholder="Deposit amount must be greater than 0.1 USDT">
    </div>
 
    <div class="deposit-address">
      <div class="form-label" id="depositProtocolLabel">The deposit address only supports TRC20-USDT</div>
      <div class="address-text" id="depositAddress">TRx7NqFh8Z2kYJg5K9p4YzD2mVwBcQrE8L</div>
      <button class="copy-btn" onclick="copyDepositAddress()">Click to copy</button>
    </div>
 
    <button class="btn-primary" onclick="submitRechargeRequest()">Deposit now</button>

    <div style="text-align:center;margin-top:16px;">
      <a href="recharge-record.html" style="color:var(--accent);font-size:13px;">View recharge record →</a>
    </div>

    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted);">
      For local currency recharge, please contact customer service
    </div>
  </div>
</div>
