<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Recharge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="recharge">
<div class="app-container">
  <div class="page-header"><span class="title">Recharge</span></div>

  <div class="recharge-form">
    <div class="form-group">
      <label class="form-label">Currency selection</label>
      <select class="form-select">
        <option>USDT</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Select the protocol to use</label>
      <select class="form-select">
        <option>TRC-20</option>
        <option>ERC-20</option>
        <option>BRC-20</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Deposit amount</label>
      <input type="number" class="form-input" placeholder="Deposit amount must be greater than 0.1 USDT">
    </div>

    <div class="deposit-address">
      <div class="form-label">The deposit address only supports TRC20-USDT</div>
      <div class="address-text">TRx7NqFh8Z2kYJg5K9p4YzD2mVwBcQrE8L</div>
      <button class="copy-btn" onclick="alert('Replication')">Click to copy</button>
    </div>

    <button class="btn-primary" onclick="alert('The submission is successful, the system is being processed, please wait ...')">Deposit now</button>

    <div style="text-align:center;margin-top:16px;">
      <a href="recharge-record.html" style="color:var(--accent);font-size:13px;">View recharge record →</a>
    </div>

    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted);">
      For local currency recharge, please contact customer service
    </div>
  </div>
</div>

  <a href="home.html" class="nav-item" data-page="home"><span class="nav-icon">🏠</span><span>Index</span></a>

  <a href="team.html" class="nav-item" data-page="team"><span class="nav-icon">👥</span><span>Team</span></a>
  <a href="profile.html" class="nav-item" data-page="profile"><span class="nav-icon">👤</span><span>Personal</span></a>
</nav>
<script src="js/app.js"></script>
</body>
</html>
