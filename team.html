<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Team</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="team">
<div class="app-container">
  <div class="page-header"><span class="title">Team</span></div>

  <div class="financial-summary">
    <div class="summary-card">
      <div class="balance-section">
        <div class="label">Balance</div>
        <div class="value">$4,250.00</div>
      </div>
      <div class="divider"></div>
      <div class="commission-section">
        <div class="label">Commission</div>
        <div class="value">$126.80</div>
      </div>
    </div>
  </div>

  <div class="action-section">
    <button class="receive-btn" onclick="alert('Commission received successfully')">Receive</button>
  </div>

  <div class="team-content-wrapper">
    <div class="team-content">
      <div class="team-stats">
        <div class="total-people">
          <span class="label">Total people</span>
          <span class="count">5</span>
        </div>
      </div>

      <div class="table-header">
        <div class="header-cell user-col">User</div>
        <div class="header-cell contribution-col">Number of contributions</div>
        <div class="header-cell state-col">State</div>
      </div>

      <div class="team-members-list">
        <div class="member-row">
          <div class="member-cell user-col"><span class="username">234****5678</span></div>
          <div class="member-cell contribution-col"><span class="contribution">$45.20</span></div>
          <div class="member-cell state-col"><span class="state active">Active</span></div>
        </div>
        <div class="member-row">
          <div class="member-cell user-col"><span class="username">567****8901</span></div>
          <div class="member-cell contribution-col"><span class="contribution">$32.50</span></div>
          <div class="member-cell state-col"><span class="state active">Active</span></div>
        </div>
        <div class="member-row">
          <div class="member-cell user-col"><span class="username">890****1234</span></div>
          <div class="member-cell contribution-col"><span class="contribution">$28.10</span></div>
          <div class="member-cell state-col"><span class="state active">Active</span></div>
        </div>
        <div class="member-row">
          <div class="member-cell user-col"><span class="username">123****4567</span></div>
          <div class="member-cell contribution-col"><span class="contribution">$15.00</span></div>
          <div class="member-cell state-col"><span class="state inactive">Inactive</span></div>
        </div>
        <div class="member-row">
          <div class="member-cell user-col"><span class="username">456****7890</span></div>
          <div class="member-cell contribution-col"><span class="contribution">$6.00</span></div>
          <div class="member-cell state-col"><span class="state inactive">Inactive</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
