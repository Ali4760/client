<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ALE Review Robot - Order Management">
  <title>ALE - Orders</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="orders">
<div class="app-container">

  <div class="page-header">
    <span class="title">Order</span>
  </div>

  <!-- Task Stats -->
  <div class="task-content">
    <div class="taskNum">Currently complete / Overall task</div>
    <div class="task-detail" id="orderStatsHeader">0/0</div>
  </div>

  <!-- Order Tabs -->
  <div class="order-btn">
    <div class="active" data-tab="undone">Undone</div>
    <div data-tab="finish">Finish</div>
  </div>

  <!-- Undone Orders -->
  <div class="order-section" id="undoneOrderSection" data-section="undone">
    <!-- Rendered dynamically -->
  </div>

  <!-- Finished Orders (hidden by default) -->
  <div class="order-section" id="finishOrderSection" data-section="finish" style="display:none;">
    <div style="padding:12px 16px; text-align:center;">
      <span class="tip-red" style="padding:0; font-weight:500;">Only showing orders from the last 3 days</span>
    </div>
    <div id="finishOrderList">
      <!-- Rendered dynamically -->
    </div>
  </div>
</div>
