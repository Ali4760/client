<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Customer service contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="server">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">Customer service contact</span>
  </div>

  <div class="content-page">
    <div style="text-align: center; padding: 30px 0;">
      <div style="margin-bottom: 20px; display:flex;align-items:center;justify-content:center;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      </div>
      <h2 style="font-size: 18px; margin-bottom: 10px;">Are you sure you contact customer service?</h2>
      <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;">My service</p>
      
      <button class="server-btn" onclick="alert('Opening WhatsApp...')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        WhatsApp
      </button>

      <button class="server-btn" style="margin-top: 12px; border-color: var(--border-color); color: var(--text-primary);" onclick="alert('Opening additional customer service...')">
        Click to open the additional customer service
      </button>
    </div>
  </div>
</div>
</body>
</html>
