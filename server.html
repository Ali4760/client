<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALE - Customer service contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="server">
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">❮</button>
    <span class="title">Customer service contact</span>
  </div>

  <div class="content-page">
    <div style="text-align: center; padding: 30px 0;">
      <div style="font-size: 64px; margin-bottom: 20px;">🎧</div>
      <h2 style="font-size: 18px; margin-bottom: 10px;">Are you sure you contact customer service?</h2>
      <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;">My service</p>
      
      <button class="server-btn" onclick="alert('Opening WhatsApp...')">
        <span>💬</span> WhatsApp
      </button>

      <button class="server-btn" style="margin-top: 12px; border-color: var(--border-color); color: var(--text-primary);" onclick="alert('Opening additional customer service...')">
        Click to open the additional customer service
      </button>
    </div>
  </div>
</div>
</body>
</html>
